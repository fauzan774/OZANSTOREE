<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OZNSTORE - Produk Kami</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- CUSTOM SCROLLBAR SESUAI GAMBAR --- */
      .price-list-container::-webkit-scrollbar {
        width: 10px;
      }
      .price-list-container::-webkit-scrollbar-track {
        background: #141421;
        border-radius: 10px;
      }
      .price-list-container::-webkit-scrollbar-thumb {
        background: #fff;
        border-radius: 10px;
      }

      /* --- STYLE POP-UP SESUAI GAMBAR ASLI --- */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
        align-items: center;
        justify-content: center;
      }
      .modal-content-custom {
        background-color: #1e1e2f;
        margin: auto;
        padding: 25px;
        border: 1px solid #2d2d44;
        border-radius: 12px;
        width: 90%;
        max-width: 450px;
        color: #fff;
        font-family: "Poppins", sans-serif;
        position: relative;
      }
      .close-btn {
        color: #aaa;
        float: right;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
        position: absolute;
        right: 20px;
        top: 15px;
      }
      .close-btn:hover {
        color: #fff;
      }

      .modal-title {
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      /* List Diamond */
      .price-list-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 230px;
        overflow-y: auto;
        padding-right: 5px;
        margin-bottom: 20px;
      }
      .price-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #141421;
        border: 1px solid #2d2d44;
        padding: 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }
      .price-item:hover {
        border-color: #555;
      }

      /* EFEK NYALA HIJAU SAAT DIAMOND DIKLIK */
      .price-item.active {
        border-color: #00e676;
        background: rgba(0, 230, 118, 0.05);
      }

      /* Form Input */
      .input-label {
        display: block;
        font-size: 13px;
        color: #a5a5b1;
        margin-bottom: 8px;
        margin-top: 15px;
      }
      .input-box {
        width: 100%;
        padding: 12px;
        background: #141421;
        border: 1px solid #2d2d44;
        border-radius: 8px;
        color: #fff;
        outline: none;
        font-family: "Poppins", sans-serif;
      }

      /* Metode Pembayaran */
      .payment-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .pay-method {
        background: #141421;
        border: 1px solid #2d2d44;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
      }
      /* EFEK NYALA HIJAU SAAT METODE DIKLIK */
      .pay-method.active {
        border-color: #00e676;
      }

      .btn-submit {
        background: #00e676;
        color: #000;
        font-weight: bold;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      /* TOMBOL BANTUAN WHATSAPP MELAYANG */
      .wa-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #25d366;
        color: #fff;
        border-radius: 50px;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
        z-index: 9999;
        font-weight: bold;
        font-size: 14px;
        transition: transform 0.3s ease;
      }
      .wa-float:hover {
        transform: translateY(-5px);
      }
      .wa-float img {
        width: 24px;
        height: 24px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">OZN<span>STORE</span></a>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Cari produk..." />
          <button type="button" onclick="searchProduct()">Cari</button>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Beranda</a></li>
          <li><a href="produk.html" class="active">Produk</a></li>
          <li><a href="tentang.html">Tentang & Riwayat</a></li>
          <li>
            <a
              href="login.html"
              id="navLoginBtn"
              style="color: var(--accent-green)"
              >Login</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-container" id="katalogUtama"></main>

    <a
      href="https://wa.me/6281234567890?text=Halo%20Admin%20OZNSTORE,%20saya%20butuh%20bantuan."
      target="_blank"
      class="wa-float"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
        alt="WhatsApp Icon"
      />
      Bantuan
    </a>

    <div class="modal" id="priceModal" style="display: none">
      <div class="modal-content-custom">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-title" id="modalTitle">Top Up Free Fire</div>

        <div class="price-list-container" id="priceGridArea"></div>

        <label class="input-label">ID Game / Email Akun</label>
        <input
          type="text"
          id="targetId"
          class="input-box"
          placeholder="Masukkan ID atau Email akun kamu"
        />

        <label class="input-label">📱 Nomor HP Aktif</label>
        <input
          type="tel"
          id="nomorHp"
          class="input-box"
          placeholder="Contoh: 081234567890"
        />

        <label class="input-label">Metode Pembayaran</label>
        <div class="payment-grid">
          <div
            class="pay-method active"
            onclick="selectPayment(this, 'QRIS/Dana')"
          >
            QRIS / DANA
          </div>
          <div
            class="pay-method"
            onclick="selectPayment(this, 'Transfer Bank')"
          >
            Transfer Bank
          </div>
        </div>

        <button class="btn-submit" onclick="prosesPembelian()">
          Proses Transaksi by System
        </button>
      </div>
    </div>

    <div class="modal" id="invoiceModal" style="display: none; z-index: 1001">
      <div
        class="modal-content-custom"
        style="max-height: 90vh; overflow-y: auto"
      >
        <h3 style="color: #00e676; margin-bottom: 15px; text-align: center">
          INVOICE PEMBAYARAN
        </h3>

        <div
          style="
            background: #141421;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.8;
          "
        >
          <p><b>ID Transaksi:</b> <span id="invId"></span></p>
          <p><b>Produk:</b> <span id="invProduk"></span></p>
          <p>
            <b>Total:</b>
            <span
              id="invHarga"
              style="color: #00e676; font-weight: bold; font-size: 15px"
            ></span>
          </p>
          <p><b>Metode:</b> <span id="invMetode"></span></p>
        </div>

        <div
          id="qrisArea"
          style="display: none; text-align: center; margin-bottom: 15px"
        >
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=OZNSTORE_MANUAL_PAYMENT"
            style="
              border: 5px solid #fff;
              border-radius: 8px;
              width: 150px;
              height: 150px;
            "
          />
        </div>
        <div
          id="bankArea"
          style="
            display: none;
            background: #141421;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2d2d44;
            margin-bottom: 15px;
            text-align: center;
          "
        >
          <p style="color: #00b0ff; font-weight: bold">BANK BCA</p>
          <h3 style="letter-spacing: 1px; font-size: 18px">8720-XXXX-XXXX</h3>
          <p style="font-size: 12px; color: #00e676">a/n FAUZAN MUTAQUIN</p>
        </div>

        <label class="input-label" style="color: #ffb300; font-weight: bold"
          >📎 Upload Bukti Transfer (Wajib)</label
        >
        <input
          type="file"
          id="buktiBayar"
          accept="image/*"
          onchange="previewBukti(event)"
          class="input-box"
          style="
            border: 1px dashed #ffb300;
            cursor: pointer;
            margin-bottom: 15px;
          "
        />
        <img
          id="previewBuktiImg"
          style="
            width: 100%;
            max-height: 150px;
            display: none;
            border-radius: 8px;
            margin-bottom: 15px;
          "
        />

        <button
          onclick="konfirmasiPembayaran()"
          class="btn-submit"
          style="margin-bottom: 10px"
        >
          ✅ Validasi & Selesaikan Pesanan
        </button>
        <button
          onclick="closeInvoice()"
          style="
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #aaa;
            color: #aaa;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          Batal / Tutup
        </button>
      </div>
    </div>

    <script>
      const defaultCategories = {
        "Free Fire": "Game Populer",
        "Mobile Legends": "Game Populer",
        "PUBG Mobile": "Game Populer",
        Valorant: "Game Populer",
        "Genshin Impact": "Game Populer",
        Roblox: "Game Populer",
        "Spotify Premium": "Streaming App",
        Netflix: "Streaming App",
        "Viu Premium": "Streaming App",
        "Vidio Premium": "Streaming App",
        "Garena Shell": "Voucher & Lainnya",
        "GooglePlay Store": "Voucher & Lainnya",
      };

      let oznKatalog = JSON.parse(localStorage.getItem("oznKatalog")) || {};
      let oznKategoriProduk =
        JSON.parse(localStorage.getItem("oznKategoriProduk")) ||
        defaultCategories;
      let oznImages = JSON.parse(localStorage.getItem("oznImages")) || {};

      let produkDipilih = "",
        varianDipilih = "",
        hargaDipilih = "",
        metodeBayar = "QRIS/Dana",
        currentTrxId = null,
        buktiBayarBase64 = null;
      const activeUser = localStorage.getItem("userActive") || "Guest";

      function renderKatalog() {
        const areaUtama = document.getElementById("katalogUtama");
        areaUtama.innerHTML = "";

        let groupProduk = {};
        for (let gameName in oznKatalog) {
          let kategori =
            defaultCategories[gameName] ||
            oznKategoriProduk[gameName] ||
            "Game Populer";
          if (!groupProduk[kategori]) groupProduk[kategori] = [];
          groupProduk[kategori].push(gameName);
        }

        for (let namaKategori in groupProduk) {
          if (groupProduk[namaKategori].length === 0) continue;

          let section = document.createElement("div");
          section.style.marginBottom = "30px";
          section.innerHTML = `<h2 class="section-title" style="margin-bottom:15px; font-size:20px; color:#fff; border-left:4px solid #00e676; padding-left:10px; font-weight:bold;">${namaKategori}</h2>`;

          let grid = document.createElement("div");
          grid.style.display = "grid";
          grid.style.gridTemplateColumns =
            "repeat(auto-fill, minmax(180px, 1fr))";
          grid.style.gap = "15px";

          groupProduk[namaKategori].forEach((gameName) => {
            const imgSrc =
              oznImages[gameName] ||
              "https://via.placeholder.com/150x150?text=" +
                encodeURIComponent(gameName);
            const card = document.createElement("div");
            card.style.background = "#1c1c30";
            card.style.padding = "15px";
            card.style.borderRadius = "12px";
            card.style.textAlign = "center";
            card.style.cursor = "pointer";
            card.style.border = "1px solid #2d2d44";
            card.onclick = () => openModal(gameName);
            card.innerHTML = `<img src="${imgSrc}" style="width:100%; height:130px; object-fit:cover; border-radius:8px; margin-bottom:10px;"><h3 style="font-size:14px; color:#fff;">${gameName}</h3>`;
            grid.appendChild(card);
          });

          section.appendChild(grid);
          areaUtama.appendChild(section);
        }
      }

      function openModal(namaProduk) {
        if (activeUser === "Guest") {
          alert(
            "Sistem Menolak: Anda wajib Login / Registrasi terlebih dahulu untuk melakukan transaksi!",
          );
          window.location.href = "login.html";
          return;
        }

        produkDipilih = namaProduk;
        varianDipilih = "";
        hargaDipilih = "";
        document.getElementById("modalTitle").innerText =
          "Top Up " + namaProduk;
        const grid = document.getElementById("priceGridArea");
        grid.innerHTML = "";

        const items = oznKatalog[namaProduk] || [];
        if (items.length === 0) {
          grid.innerHTML =
            "<p style='text-align:center; color:#aaa; font-size:13px;'>Belum ada varian / stok.</p>";
        } else {
          items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "price-item";

            const isHabis =
              item.stock === "Habis" ||
              item.stock === "0" ||
              item.stock === "kosong";
            const labelStok = isHabis
              ? `<span style="color:#ff3d00; font-size:11px;">Habis</span>`
              : `<span style="color:#00e676; font-size:11px;">Stok: Tersedia</span>`;

            // Format HTML persis seperti screenshot (kiri, tengah hijau, kanan stok)
            div.innerHTML = `
              <div style="flex:1; text-align:left; font-size:14px;">${item.qty}</div>
              <div style="flex:1; text-align:center; color:#00e676; font-weight:bold; font-size:15px;">${item.price}</div>
              <div style="flex:1; text-align:right;">${labelStok}</div>
            `;

            if (isHabis) {
              div.style.opacity = "0.4";
              div.style.cursor = "not-allowed";
              div.onclick = () =>
                alert("Maaf, varian ini sedang habis stoknya!");
            } else {
              div.onclick = function () {
                document
                  .querySelectorAll(".price-item")
                  .forEach((e) => e.classList.remove("active"));
                div.classList.add("active");
                varianDipilih = item.qty;
                hargaDipilih = item.price;
              };
            }
            grid.appendChild(div);
          });
        }
        document.getElementById("priceModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("priceModal").style.display = "none";
      }

      function selectPayment(el, method) {
        document
          .querySelectorAll(".pay-method")
          .forEach((e) => e.classList.remove("active"));
        el.classList.add("active");
        metodeBayar = method;
      }

      function prosesPembelian() {
        const idTarget = document.getElementById("targetId").value.trim();
        const nomorHp = document.getElementById("nomorHp").value.trim();

        if (!varianDipilih) {
          alert("Silakan pilih varian diamond/paket terlebih dahulu!");
          return;
        }
        if (!idTarget || !nomorHp) {
          alert("Harap isi ID Target dan Nomor HP Aktif!");
          return;
        }

        buktiBayarBase64 = null;
        document.getElementById("buktiBayar").value = "";
        document.getElementById("previewBuktiImg").style.display = "none";

        let history = JSON.parse(localStorage.getItem("oznTransactions")) || [];
        const trx = {
          id: "OZN" + Math.floor(Math.random() * 90000 + 10000),
          pembeli: activeUser,
          nomorHp,
          produk: produkDipilih,
          paket: varianDipilih,
          tujuan: idTarget,
          harga: hargaDipilih,
          metode: metodeBayar,
          status: "Menunggu Bukti",
          buktiTransfer: "",
          waktu: new Date().toLocaleString("id-ID"),
        };
        history.push(trx);
        localStorage.setItem("oznTransactions", JSON.stringify(history));
        currentTrxId = trx.id;

        closeModal();
        showInvoice(trx);
      }

      function showInvoice(trx) {
        document.getElementById("invId").innerText = "#" + trx.id;
        document.getElementById("invProduk").innerText =
          trx.produk + " (" + trx.paket + ")";
        document.getElementById("invHarga").innerText = trx.harga;
        document.getElementById("invMetode").innerText = trx.metode;

        document.getElementById("qrisArea").style.display = trx.metode.includes(
          "QRIS",
        )
          ? "block"
          : "none";
        document.getElementById("bankArea").style.display = trx.metode.includes(
          "QRIS",
        )
          ? "none"
          : "block";
        document.getElementById("invoiceModal").style.display = "flex";
      }

      function previewBukti(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          buktiBayarBase64 = e.target.result;
          document.getElementById("previewBuktiImg").src = buktiBayarBase64;
          document.getElementById("previewBuktiImg").style.display = "block";
        };
        reader.readAsDataURL(file);
      }

      function konfirmasiPembayaran() {
        if (!buktiBayarBase64) {
          alert("Peringatan: Anda wajib mengunggah bukti transfer!");
          return;
        }
        let history = JSON.parse(localStorage.getItem("oznTransactions")) || [];
        const idx = history.findIndex((t) => t.id === currentTrxId);
        if (idx !== -1) {
          history[idx].buktiTransfer = buktiBayarBase64;
          history[idx].status = "Pending";
          localStorage.setItem("oznTransactions", JSON.stringify(history));
        }
        document.getElementById("invoiceModal").style.display = "none";
        alert(
          "✅ Pesanan berhasil dikirim ke sistem!\nSilakan cek status pesanan di menu Riwayat.",
        );
      }

      function closeInvoice() {
        document.getElementById("invoiceModal").style.display = "none";
      }

      function searchProduct() {
        const keyword = document
          .getElementById("searchInput")
          .value.toLowerCase();
        document.querySelectorAll(".product-card").forEach((card) => {
          card.style.display = card.innerText.toLowerCase().includes(keyword)
            ? "block"
            : "none";
        });
      }

      window.onload = function () {
        renderKatalog();
        if (activeUser !== "Guest") {
          const navLoginBtn = document.getElementById("navLoginBtn");
          navLoginBtn.innerText = "Logout (" + activeUser + ")";
          navLoginBtn.href = "#";
          navLoginBtn.onclick = () => {
            localStorage.removeItem("userActive");
            localStorage.removeItem("userRole");
            window.location.reload();
          };
        }
      };
    </script>
  </body>
</html>
